version: '3.8'

services:
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: clickhouse_kba
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=kba_admin
    volumes:
      - clickhouse_data:/var/lib/clickhouse

  postgres_odoo:
      image: postgres:15
      container_name: postgres_kba
      ports:
        - "5433:5432"
      environment:
        - POSTGRES_USER=odoo_admin
        - POSTGRES_PASSWORD=kba_rahasia
        - POSTGRES_DB=odoo_dummy
      volumes:
        - postgres_odoo_data_baru:/var/lib/postgresql/data

volumes:
  clickhouse_data:
  postgres_odoo_data_baru: